name: Daily GHL Calendar Update

on:
  schedule:
    - cron: "0 11 * * 1"  # Monday at 7:00 AM EDT (11:00 UTC)
    - cron: "0 11 * * 5"  # Friday at 7:00 AM EDT (11:00 UTC)
  workflow_dispatch:

jobs:
  post-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run GHL Calendar Script
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python ghl_calendar.py
